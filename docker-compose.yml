# FriendFind — Full Stack (Node + MySQL + phpMyAdmin)
# รัน: docker compose up --build -d
# หยุด: docker compose down
# เข้าจัดการ DB: เปิดพอร์ต 8080 (Username: root, Password: ตามที่ตั้งไว้)

services:
  db:
    image: mysql:8.0
    container_name: friendfind-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-friendfind_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-study_match_db}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "-p${MYSQL_ROOT_PASSWORD:-friendfind_root}",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks:
      - friendfind-net

  backend:
    build:
      context: ./backend/backend
      dockerfile: Dockerfile
    container_name: friendfind-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5001}:5001"
    environment:
      PORT: "5001"
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-friendfind_root}
      DB_NAME: ${MYSQL_DATABASE:-study_match_db}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/backend:/app
      # - /app/node_modules
    networks:
      - friendfind-net

  # เพิ่มส่วนนี้เพื่อใช้จัดการ Database ผ่านหน้าเว็บแบบ Laragon
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: friendfind-phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=db
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-friendfind_root}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - friendfind-net

volumes:
  mysql_data:

networks:
  friendfind-net:
    driver: bridge
